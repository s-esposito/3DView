<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3DView — COLMAP, mesh &amp; 3DGS viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e639c'/%3E%3Cpath d='M16 6l8 4.5v9L16 24l-8-4.5v-9z' fill='none' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3Cpath d='M8 10.5l8 4.5 8-4.5M16 15v9' fill='none' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      /* The viewer bundle appends its canvas to <body>; fill the viewport. */
      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* Status overlay the viewer writes into (it looks up #status by id).
         A centered frosted pill matching the viewer's panels (whose styles the
         bundle injects); the bundle toggles display:flex / display:none. */
      #status {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        max-width: min(560px, calc(100vw - 32px));
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 12px 18px;
        color: #e6e6e6;
        background: rgba(20, 20, 22, 0.72);
        -webkit-backdrop-filter: blur(12px) saturate(1.3);
        backdrop-filter: blur(12px) saturate(1.3);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        font-size: 13px;
        line-height: 1.5;
        z-index: 100;
        pointer-events: none;
      }

      #status code {
        background: rgba(255, 255, 255, 0.1);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="status">Click <strong>+</strong> in the Scene panel to load a COLMAP folder (the project dir with <code>sparse/</code> and <code>images/</code>) or an asset file — a mesh or a 3DGS splat.</div>

    <!-- The demo host bridge installs window.__viewerHost and then injects the
         viewer bundle (dist/webview.js) — see src/main.ts for why the bundle is
         loaded from here rather than a second <script> tag. -->
    <script type="module" src="dist/demo.js"></script>
  </body>
</html>
